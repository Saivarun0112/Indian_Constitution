<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Indian Constitution - Games</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #121212;
      color: #f5f5f5;
    }

    h1 {
      text-align: center;
      color: #ff9800;
      font-size: 2.5em;
      margin-top: 40px;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 30px;
      max-width: 900px;
      margin: 50px auto;
      padding: 0 20px;
    }

    .game-card {
      background: #1e1e1e;
      border-radius: 14px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
      padding: 20px;
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .game-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.6);
    }

    .game-card h2 {
      color: #ffb74d;
      margin-bottom: 10px;
      font-size: 1.5em;
    }

    .game-card p {
      color: #cccccc;
      font-size: 0.95em;
      margin-bottom: 16px;
    }

    .game-card a {
      text-decoration: none;
    }

    .game-card button {
      padding: 12px;
      background: #ff9800;
      color: white;
      font-size: 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      transition: background 0.3s ease;
    }

    .game-card button:hover {
      background: #fb8c00;
    }

    /* Updated Back Button Style with link */
    .back-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 50px auto 30px;
      background: transparent;
      border: 2px solid #ff9800;
      color: #ff9800;
      padding: 12px 30px;
      border-radius: 30px;
      font-size: 16px;
      cursor: pointer;
      font-weight: 600;
      width: fit-content;
      transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
      box-shadow: 0 0 10px rgba(255, 152, 0, 0.5);
      text-decoration: none;
    }

    .back-btn:hover {
      background: #ff9800;
      color: #121212;
      border-color: #ff9800;
      box-shadow: 0 0 15px rgba(255, 152, 0, 0.9);
    }

    .back-btn::before {
      content: "";
      display: inline-block;
      border: solid currentColor;
      border-width: 0 3px 3px 0;
      padding: 6px;
      margin-right: 10px;
      transform: rotate(135deg);
      -webkit-transform: rotate(135deg);
      transition: border-color 0.3s ease;
    }

    .back-btn:hover::before {
      border-color: #121212;
    }

    @media (max-width: 768px) {
      .button-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <h1>Choose a Game</h1>

  <div class="button-grid">
    <div class="game-card">
      <h2>Spin Wheel</h2>
      <p>Spin and answer questions!</p>
      <a href="/spin"><button>Play</button></a>
    </div>

    <div class="game-card">
      <h2>Card Flip</h2>
      <p>Flip and match terms.</p>
      <a href="/card"><button>Play</button></a>
    </div>

    <div class="game-card">
      <h2>Matching Pairs</h2>
      <p>Find related pairs.</p>
      <a href="/match"><button>Play</button></a>
    </div>

    <div class="game-card">
      <h2>Quiz Game</h2>
      <p>Test your knowledge.</p>
      <a href="/quiz"><button>Play</button></a>
    </div>
  </div>

  <!-- Back button linking to homepage -->
  <a href="/" class="back-btn">Back</a>
</body>
</html>
