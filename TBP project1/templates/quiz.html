<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Indian Constitution Quiz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(to right, #e3f2fd, #e1f5fe);
      color: #212121;
      line-height: 1.6;
    }
    header {
      background-color: #0d47a1;
      color: white;
      padding: 30px;
      text-align: left;
    }
    header h1 {
      margin: 0;
      font-size: 2.5em;
    }
    main {
      display: flex;
      flex-direction: column;
      padding: 40px 60px;
    }
    .quiz-section {
      max-width: 800px;
      width: 100%;
    }
    .quiz-question {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 20px;
      color: #0d47a1;
    }
    .quiz-option {
      background-color: #42a5f5;
      color: white;
      border: 2px solid transparent;
      border-radius: 8px;
      padding: 15px 25px;
      margin: 10px 0;
      width: 100%;
      text-align: left;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .quiz-option:hover {
      background-color: #1e88e5;
    }
    .quiz-option.selected {
      background-color: #1565c0;
      border-color: #0d47a1;
    }
    .navigation-buttons {
      margin-top: 20px;
    }
    .nav-button {
      background-color: #00897b;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 20px;
      margin-right: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    .nav-button:hover {
      background-color: #00695c;
    }
    #score {
      font-size: 22px;
      color: #2e7d32;
      margin-top: 30px;
      font-weight: bold;
    }
    #back-button, #reattempt-button, #show-answers-button {
      background-color: #f4511e;
      color: white;
      border: none;
      padding: 10px 18px;
      margin-top: 20px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-right: 10px;
    }
    #back-button:hover, #reattempt-button:hover, #show-answers-button:hover {
      background-color: #bf360c;
    }
    #timer {
      font-size: 18px;
      color: #d84315;
      margin-bottom: 20px;
    }
    #progress {
      font-size: 18px;
      margin-bottom: 10px;
      color: #0d47a1;
    }
    .answer-review {
      margin-top: 20px;
      font-size: 18px;
      color: #6a1b9a;
    }
    @media (max-width: 768px) {
      main {
        padding: 20px;
      }
      header h1 {
        font-size: 2em;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Test Your Knowledge: Indian Constitution Quiz</h1>
    <p>Engaging questions to learn and explore your understanding of the Constitution.</p>
  </header>

  <main>
    <div id="timer">Time: <span id="time">0</span> seconds</div>
    <div id="progress"></div>
    <section class="quiz-section" id="quiz-container"></section>

    <div class="navigation-buttons" id="nav-buttons">
      <button class="nav-button" onclick="prevQuestion()">Previous</button>
      <button class="nav-button" onclick="nextQuestion()">Next</button>
      <button class="nav-button" onclick="submitQuiz()">Submit</button>
    </div>

    <div id="score"></div>
    <div class="answer-review" id="review"></div>
    <div>
      <button id="reattempt-button" style="display:none" onclick="reattemptQuiz()">Reattempt Quiz</button>
      <button id="show-answers-button" style="display:none" onclick="showAnswers()">Show Answers</button>
      <button id="back-button" style="display:none" onclick="goHome()">Back to Home</button>
    </div>
  </main>

  <script>
    const quizQuestions = [
      { question: "What is the supreme law of India?", options: ["The Constitution", "The Parliament", "The President"], answer: 0 },
      { question: "How many fundamental rights are there?", options: ["6", "8", "10"], answer: 0 },
      { question: "Who is known as the Father of the Indian Constitution?", options: ["Mahatma Gandhi", "B.R. Ambedkar", "Jawaharlal Nehru"], answer: 1 },
      { question: "When did the Constitution come into effect?", options: ["26th Jan 1950", "15th Aug 1947", "2nd Oct 1950"], answer: 0 },
      { question: "Which part deals with Fundamental Duties?", options: ["Part IV-A", "Part III", "Part V"], answer: 0 }
    ];

    let currentIndex = 0;
    let userAnswers = new Array(quizQuestions.length).fill(null);
    let timer = 0;
    let timerInterval = setInterval(() => {
      timer++;
      document.getElementById("time").textContent = timer;
    }, 1000);

    function renderQuestion() {
      const container = document.getElementById("quiz-container");
      const q = quizQuestions[currentIndex];
      const progress = document.getElementById("progress");
      progress.textContent = `Question ${currentIndex + 1} of ${quizQuestions.length}`;

      let html = `<div class='quiz-question'>${currentIndex + 1}. ${q.question}</div>`;
      q.options.forEach((opt, i) => {
        const selectedClass = userAnswers[currentIndex] === i ? 'selected' : '';
        html += `<button class="quiz-option ${selectedClass}" onclick="selectOption(${i})">${opt}</button>`;
      });

      container.innerHTML = html;
      document.getElementById("review").textContent = "";
    }

    function selectOption(i) {
      userAnswers[currentIndex] = i;
      renderQuestion();
    }

    function nextQuestion() {
      if (currentIndex < quizQuestions.length - 1) {
        currentIndex++;
        renderQuestion();
      }
    }

    function prevQuestion() {
      if (currentIndex > 0) {
        currentIndex--;
        renderQuestion();
      }
    }

    function submitQuiz() {
      clearInterval(timerInterval);
      let score = 0;
      quizQuestions.forEach((q, i) => {
        if (userAnswers[i] === q.answer) score++;
      });

      const feedback = score === 5 ? "Excellent work!" : (score >= 3 ? "Good effort!" : "Keep practicing!");

      document.getElementById("quiz-container").innerHTML = `<h3>Quiz Completed!</h3><p>${feedback}</p>`;
      document.getElementById("score").textContent = `You scored ${score} out of ${quizQuestions.length}`;
      document.getElementById("nav-buttons").style.display = "none";
      document.getElementById("reattempt-button").style.display = "inline-block";
      document.getElementById("show-answers-button").style.display = "inline-block";
      document.getElementById("back-button").style.display = "inline-block";
    }

    function showAnswers() {
      let review = "<h4>Correct Answers:</h4><ul>";
      quizQuestions.forEach((q, i) => {
        review += `<li>Q${i + 1}: ${q.question}<br>Correct Answer: <strong>${q.options[q.answer]}</strong></li>`;
      });
      review += "</ul>";
      document.getElementById("review").innerHTML = review;
    }

    function reattemptQuiz() {
      currentIndex = 0;
      userAnswers = new Array(quizQuestions.length).fill(null);
      timer = 0;
      document.getElementById("time").textContent = timer;
      timerInterval = setInterval(() => {
        timer++;
        document.getElementById("time").textContent = timer;
      }, 1000);
      document.getElementById("nav-buttons").style.display = "block";
      document.getElementById("score").textContent = "";
      document.getElementById("review").textContent = "";
      document.getElementById("reattempt-button").style.display = "none";
      document.getElementById("show-answers-button").style.display = "none";
      document.getElementById("back-button").style.display = "none";
      renderQuestion();
    }

    function goHome() {
      window.location.href = "/";
    }

    renderQuestion();
  </script>
</body>
</html>
